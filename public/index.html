<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080c14; color: #fff; font-family: system-ui, sans-serif; padding: 20px; }
  h1 { font-family: monospace; margin-bottom: 6px; }
  h1 span.live { font-size: 12px; background: rgba(0,180,255,0.12); color: #00b4ff; padding: 2px 8px; border-radius: 20px; margin-left: 8px; vertical-align: middle; }
  .subtitle { font-size: 12px; color: rgba(255,255,255,0.35); margin-bottom: 20px; }
  button.refresh { background: rgba(0,180,255,0.12); border: 1px solid rgba(0,180,255,0.3); color: #00b4ff; padding: 10px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; margin-bottom: 20px; }
  .log { font-family: monospace; font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 16px; min-height: 16px; }
  .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 18px 20px; margin-bottom: 12px; }
  .card.buy { border-color: rgba(0,255,136,0.3); background: rgba(0,255,136,0.04); }
  .card.sell { border-color: rgba(255,68,102,0.3); background: rgba(255,68,102,0.04); }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .ticker { font-family: monospace; font-size: 18px; font-weight: 700; }
  .etf-name { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }
  .price-block { text-align: right; }
  .price { font-family: monospace; font-size: 22px; font-weight: 800; }
  .change { font-size: 13px; font-weight: 700; margin-top: 2px; }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .stat { background: rgba(255,255,255,0.04); border-radius: 8px; padding: 8px 10p; }
  .stat-label { font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 3px; }
  .stat-value { font-size: 13px; font-weight: 700; font-family: monospace; }
  .signal { display: inline-flex; align-items: center; gap: 6px; padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-top: 4px; }
  .signal.buy { background: rgba(0,255,136,0.15); border: 1px solid rgba(0,255,136,0.4); color: #00ff88; }
  .signal.sell { background: rgba(255,68,102,0.15); border: 1px solid rgba(255,68,102,0.4); color: #ff4466; }
  .signal.hold { background: rgba(255,204,0,0.12); border: 1px solid rgba(255,204,0,0.3); color: #ffcc00; }
  .indicators { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .ind { font-size: 11px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 4px 10px; color: rgba(255,255,255,0.5); }
  .disclaimer { margin-top: 24px; padding: 14px 18px; background: rgba(255,204,0,0.04); border: 1px solid rgba(255,204,0,0.15); border-radius: 12px; font-size: 11px; color: rgba(255,255,255,0.35); line-height: 1.6; }
</style>
</head>
<body>

<h1>📈 ETF Tracker <span class="live">LIVE</span></h1>
<div class="subtitle" id="lastUpdate">Caricamento...</div>
<button class="refresh" onclick="loadAll()">🔄 Refresh</button>
<div class="log" id="log"></div>
<div id="cards"></div>

<div class="disclaimer">
  ⚠️ <strong style="color:rgba(255,204,0,0.7)">Disclaimer:</strong> I segnali di acquisto/vendita sono basati su indicatori tecnici automatici e non costituiscono consulenza finanziaria. Fai sempre le tue ricerche e considera di consultare un professionista prima di investire.
</div>

<script>
const ETFS = [
  { ticker: "SPY",  name: "S&P 500 ETF" },
{ ticker: "QQQ",  name: "Nasdaq 100 ETF" },
  { ticker: "VTI",  name: "Total US Market" },
  { ticker: "ARKK", name: "Innovation ETF" },
  { ticker: "GLD",  name: "Gold ETF" },
  { ticker: "TLT",  name: "Long-Term Bonds" },
];

function log(msg) {
  document.getElementById("log").innerHTML = msg;
}

function calcSignal(change, rsi, aboveMA) {
  let bullish = 0;
  if (change > 0.5) bullish++;
  if (change > 1.5) bullish++;
  if (rsi < 35) bullish += 2;
  if (rsi > 65) bullish -= 2;
  if (aboveMA) bullish++;
  else bullish--;

  if (bullish >= 2) return { label: "🟢 Segnale Acquisto", cls: "buy" };
  if (bullish <= -1) return { label: "🔴 Segnale Vendita", cls: "sell" };
  return { label: "🟡 Mantieni", cls: "hold" };
}
function estimateRSI(change) {
  // Stima semplice RSI basata sul cambio giornaliero
  const base = 50;
  return Math.min(90, Math.max(10, base + change * 8));
}

async function fetchETF(ticker) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=60d`;
  const res = await fetch(url);
  const data = await res.json();
  const result = data?.chart?.result?.[0];
  const meta = result?.meta ?? {};
  const closes = result?.indicators?.quote?.[0]?.close ?? [];

  const price = meta.regularMarketPrice ?? 0;
  const prevClose = meta.chartPreviousClose ?? meta.previousClose ?? price;
  const change = prevClose ? ((price - prevClose) / prevClose) * 100 : 0;
  const volume = meta.regularMarketVolume ?? 0;

// Media mobile 20 giorni
  const recent = closes.filter(Boolean).slice(-20);
  const ma20 = recent.length ? recent.reduce((a, b) => a + b, 0) / recent.length : price;
  const aboveMA = price > ma20;

  // RSI stimato
  const rsi = estimateRSI(change);

  return { price, change, volume, ma20, aboveMA, rsi };
}

async function loadAll() {
  document.getElementById("cards").innerHTML = "";
  log("🔄 Fetching dati Yahoo Finance...");

  for (const etf of ETFS) {
    try {
      log(`📡 ${etf.ticker}...`);
      const d = await fetchETF(etf.ticker);
      const signal = calcSignal(d.change, d.rsi, d.aboveMA);
      const changeColor = d.change >= 0 ? "#00ff88" : "#ff4466";
      const changeSign = d.change >= 0 ? "+" : "";
  
document.getElementById("cards").innerHTML += `
        <div class="card ${signal.cls}">
          <div class="card-header">
            <div>
              <div class="ticker">${etf.ticker}</div>
              <div class="etf-name">${etf.name}</div>
            </div>
            <div class="price-block">
              <div class="price">$${d.price.toFixed(2)}</div>
              <div class="change" style="color:${changeColor}">${changeSign}${d.change.toFixed(2)}%</div>
            </div>
          </div>
<div class="stats">
            <div class="stat">
              <div class="stat-label">MA 20gg</div>
              <div class="stat-value">$${d.ma20.toFixed(2)}</div>
            </div>
            <div class="stat">
              <div class="stat-label">Vs MA</div>
              <div class="stat-value" style="color:${d.aboveMA ? '#00ff88' : '#ff4466'}">${d.aboveMA ? "▲ Sopra" : "▼ Sotto"}</div>
            </div>
            <div class="stat">
              <div class="stat-label">RSI est.</div>
              <div class="stat-value" style="color:${d.rsi < 35 ? '#00ff88' : d.rsi > 65 ? '#ff4466' : '#fff'}">${d.rsi.toFixed(0)}</div>
            </div>
          </div>
          <div class="signal ${signal.cls}">${signal.label}</div>
          <div class="indicators">
            <div class="ind">RSI ${d.rsi < 35 ? "ipervenduto 📉" : d.rsi > 65 ? "ipercomprato 📈" : "neutro"}</div>
            <div class="ind">Trend ${d.aboveMA ? "rialzista" : "ribassista"}</div>
            <div class="ind">Vol ${(d.volume/1000000).toFixed(1)}M</div>
          </div>
        </div>`;
    } catch(e) {
      log(`❌ ${etf.ticker}: ${e.message}`);
}
  }

  log("");
  document.getElementById("lastUpdate").textContent =
    "Aggiornato: " + new Date().toLocaleTimeString("it-IT");
}

loadAll();
</script>
</body>
</html>
