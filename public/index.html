<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080c14;color:#fff;font-family:system-ui,sans-serif;padding:20px}
h1{font-family:monospace;margin-bottom:6px}
.sub{font-size:12px;color:rgba(255,255,255,0.35);margin-bottom:20px}
button{background:rgba(0,180,255,0.12);border:1px solid rgba(0,180,255,0.3);color:#00b4ff;padding:10px 20px;border-radius:10px;font-weight:700;cursor:pointer;margin-bottom:20px}
.log{font-family:monospace;font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:16px}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:18px 20px;margin-bottom:12px}
.card.buy{border-color:rgba(0,255,136,0.3);background:rgba(0,255,136,0.04)}
.card.sell{border-color:rgba(255,68,102,0.3);background:rgba(255,68,102,0.04)}
.card.hold{border-color:rgba(255,204,0,0.3);background:rgba(255,204,0,0.04)}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ticker{font-family:monospace;font-size:18px;font-weight:700}
.name{font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px}
.price{font-family:monospace;font-size:22px;font-weight:800;text-align:right}
.chg{font-size:13px;font-weight:700;text-align:right;margin-top:2px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:rgba(255,255,255,0.04);border-radius:8px;padding:8px 10px}
.sl{font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:3px}
.sv{font-size:13px;font-weight:700;font-family:monospace}
.signal{display:inline-flex;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;margin-top:4px}
.signal.buy{background:rgba(0,255,136,0.15);border:1px solid rgba(0,255,136,0.4);color:#00ff88}
.signal.sell{background:rgba(255,68,102,0.15);border:1px solid rgba(255,68,102,0.4);color:#ff4466}
.signal.hold{background:rgba(255,204,0,0.12);border:1px solid rgba(255,204,0,0.3);color:#ffcc00}
.inds{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.ind{font-size:11px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:4px 10px;color:rgba(255,255,255,0.5)}
.disc{margin-top:24px;padding:14px 18px;background:rgba(255,204,0,0.04);border:1px solid rgba(255,204,0,0.15);border-radius:12px;font-size:11px;color:rgba(255,255,255,0.35);line-height:1.6}
</style>
</head>
<body>
<h1>📈 ETF Tracker <span style="font-size:12px;background:rgba(0,180,255,0.12);color:#00b4ff;padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:middle">LIVE</span></h1>
<div class="sub" id="upd">Caricamento...</div>
<button onclick="loadAll()">🔄 Refresh</button>
<div class="log" id="log"></div>
<div id="cards"></div>
<div class="disc">⚠️ <strong style="color:rgba(255,204,0,0.7)">Disclaimer:</strong> I segnali sono basati su indicatori tecnici automatici e non costituiscono consulenza finanziaria.</div>
<script>
var ETFS=[
  {t:"SPY",n:"S&P 500 ETF"},
  {t:"QQQ",n:"Nasdaq 100 ETF"},
  {t:"VTI",n:"Total US Market"},
  {t:"ARKK",n:"Innovation ETF"},
  {t:"GLD",n:"Gold ETF"},
  {t:"TLT",n:"Long-Term Bonds"}
];
function log(m){document.getElementById("log").innerHTML=m}
function sig(change,rsi,aboveMA){
  var b=0;
  if(change>0.5)b++;
  if(change>1.5)b++;
  if(rsi<35)b+=2;
  if(rsi>65)b-=2;
  if(aboveMA)b++; else b--;
  if(b>=2)return{l:"🟢 Acquisto",c:"buy"};
  if(b<=-1)return{l:"🔴 Vendita",c:"sell"};
  return{l:"🟡 Mantieni",c:"hold"};
}
function rsiEst(c){return Math.min(90,Math.max(10,50+c*8))}
async function fetchETF(t){
  var r=await fetch("https://query1.finance.yahoo.com/v8/finance/chart/"+t+"?interval=1d&range=60d");
  var d=await r.json();
  var res=d.chart.result[0];
  var meta=res.meta;
  var closes=res.indicators.quote[0].close;
  var price=meta.regularMarketPrice||0;
  var prev=meta.chartPreviousClose||meta.previousClose||price;
  var change=prev?((price-prev)/prev)*100:0;
  var vol=meta.regularMarketVolume||0;
  var recent=closes.filter(Boolean).slice(-20);
  var ma20=recent.length?recent.reduce(function(a,b){return a+b},0)/recent.length:price;
  return{price:price,change:change,vol:vol,ma20:ma20,above:price>ma20,rsi:rsiEst(change)};
}
async function loadAll(){
  document.getElementById("cards").innerHTML="";
  log("🔄 Caricamento...");
  for(var i=0;i<ETFS.length;i++){
    var e=ETFS[i];
    try{
      log("📡 "+e.t+"...");
      var d=await fetchETF(e.t);
      var s=sig(d.change,d.rsi,d.above);
      var cc=d.change>=0?"#00ff88":"#ff4466";
      var cs=d.change>=0?"+":"";
      var maC=d.above?"#00ff88":"#ff4466";
      var rsiC=d.rsi<35?"#00ff88":d.rsi>65?"#ff4466":"#fff";
      document.getElementById("cards").innerHTML+=
        '<div class="card '+s.c+'">'+
        '<div class="row">'+
        '<div><div class="ticker">'+e.t+'</div><div class="name">'+e.n+'</div></div>'+
        '<div><div class="price">$'+d.price.toFixed(2)+'</div><div class="chg" style="color:'+cc+'">'+cs+d.change.toFixed(2)+'%</div></div>'+
        '</div>'+
        '<div class="stats">'+
        '<div class="stat"><div class="sl">MA 20gg</div><div class="sv">$'+d.ma20.toFixed(2)+'</div></div>'+
        '<div class="stat"><div class="sl">Vs MA</div><div class="sv" style="color:'+maC+'">'+(d.above?"▲ Sopra":"▼ Sotto")+'</div></div>'+
        '<div class="stat"><div class="sl">RSI est.</div><div class="sv" style="color:'+rsiC+'">'+d.rsi.toFixed(0)+'</div></div>'+
        '</div>'+
        '<div class="signal '+s.c+'">'+s.l+'</div>'+
        '<div class="inds">'+
        '<div class="ind">RSI '+(d.rsi<35?"ipervenduto":d.rsi>65?"ipercomprato":"neutro")+'</div>'+
        '<div class="ind">Trend '+(d.above?"rialzista":"ribassista")+'</div>'+
        '<div class="ind">Vol '+(d.vol/1000000).toFixed(1)+'M</div>'+
        '</div></div>';
    }catch(err){log("❌ "+e.t+": "+err.message)}
  }
  log("");
  document.getElementById("upd").textContent="Aggiornato: "+new Date().toLocaleTimeString("it-IT");
}
loadAll();
</script>
</body>
</html>
